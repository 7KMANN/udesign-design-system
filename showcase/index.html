<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDesign Showcase & Previewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tokens style tag that can be hot-swapped for version testing, dynamically injected to prevent Vite bundling -->
  <script>
    (function() {
      var link = document.createElement('link');
      link.id = 'tokens-link';
      link.rel = 'stylesheet';
      link.href = '../dist/tokens.css';
      document.head.appendChild(link);
    })();
  </script>
</head>
<body class="bg-background text-foreground min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
